name: Backend
on:
  push:
    branches:
      - main
    paths:
    - "src/**"
    - "src/Services/CardsService/Dockerfile.prod"
    - "src/Services/AuthService/Dockerfile.prod"
    - "docker-compose.prod.yml"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./src/Services/CardsService
          file: ./src/Services/CardsService/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cards-service:latest
            ghcr.io/${{ github.repository_owner }}/cards-service:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/Services/AuthService
          file: ./src/Services/AuthService/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auth-service:latest
            ghcr.io/${{ github.repository_owner }}/auth-service:${{ github.sha }}
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/mtg-price-tracker
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm auth-migration
            docker compose -f docker-compose.prod.yml run --rm cards-migration
            docker compose -f docker-compose.prod.yml up -d
            docker exec nginx nginx -t
            docker exec nginx nginx -s reload