  cards-service:
    build:
      context: ./src/Services/CardsService
      dockerfile: Dockerfile.dev
    container_name: mtg-cards-service
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5072:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CardsDatabase: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
  
  frontend:
    build:
      context: ./frontend/mtg-price-tracker-web
      dockerfile: Dockerfile.dev
    container_name: mtg-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - cards-service

volumes:
  postgres_data:
